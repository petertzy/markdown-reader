name: Deploy MkDocs

on:
  push:
    branches:
      - main  

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install docs dependencies
        run: uv sync --locked --extra docs

      - name: Deploy
        run: uv run mkdocs gh-deploy --force