name: Add Contributor

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

jobs:
  add-contributor:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login != github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add contributor to CONTRIBUTORS.md
        env:
          CONTRIBUTOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check if CONTRIBUTORS.md exists
          if [ ! -f CONTRIBUTORS.md ]; then
            echo "CONTRIBUTORS.md not found, skipping."
            exit 0
          fi

          # Check if contributor is already in the list
          if grep -q "@${CONTRIBUTOR}" CONTRIBUTORS.md; then
            echo "${CONTRIBUTOR} is already in CONTRIBUTORS.md"
            exit 0
          fi

          echo "Adding ${CONTRIBUTOR} to CONTRIBUTORS.md (PR #${PR_NUMBER})"

          # Insert new contributor before the "## How to Contribute" line
          ENTRY="- [@${CONTRIBUTOR}](https://github.com/${CONTRIBUTOR}) - ${PR_TITLE} (#${PR_NUMBER})"
          sed -i "/^## How to Contribute/i ${ENTRY}" CONTRIBUTORS.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          git commit -m "Add ${CONTRIBUTOR} to contributors list (#${PR_NUMBER})"
          git push
